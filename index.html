<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Whisper — Anonymous Messages</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Poppins:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Anek+Malayalam:wght@100..800&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #ffffff;
            --surface: #f0fdf4;
            --card: #ffffff;
            --border: rgba(22, 101, 52, 0.08);
            --border-hover: rgba(22, 101, 52, 0.15);
            --text: #14532d;
            --muted: rgba(20, 83, 45, 0.5);
            --accent: #16a34a;
            --accent-soft: rgba(22, 163, 74, 0.1);
            --accent-glow: rgba(22, 163, 74, 0.2);
            --teal: #10b981;
            --teal-soft: rgba(16, 185, 129, 0.08);
            --lavender: #84cc16;
            --lavender-soft: rgba(132, 204, 22, 0.08);
            --serif: 'Instrument Serif', Georgia, serif;
            --sans: 'DM Sans', system-ui, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* noise overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
            opacity: 0.6;
        }

        .container {
            max-width: 430px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── HEADER ── */
        header {
            padding: 56px 24px 32px;
            text-align: center;
        }

        .logo-mark {
            width: 48px;
            height: 48px;
            background: var(--accent-soft);
            border: 1px solid rgba(22, 163, 74, 0.25);
            border-radius: 16px;
            display: grid;
            place-items: center;
            margin: 0 auto 20px;
        }

        .logo-mark svg {
            width: 22px;
            height: 22px;
        }

        h1 {
            font-family: var(--serif);
            font-size: 34px;
            font-weight: 400;
            font-style: italic;
            color: var(--text);
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .tagline {
            font-size: 13px;
            color: var(--muted);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-weight: 300;
        }



        /* ── COMPOSE VIEW ── */
        #compose-view {
            padding: 0 24px;
            flex: 1;
        }

        .label {
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            font-weight: 500;
            margin-bottom: 10px;
            display: block;
        }

        .mood-row {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            overflow-x: auto;
            scrollbar-width: none;
            padding-bottom: 2px;
        }

        .mood-row::-webkit-scrollbar {
            display: none;
        }

        .mood-chip {
            flex-shrink: 0;
            padding: 7px 14px;
            border-radius: 100px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--muted);
            font-size: 12px;
            font-family: var(--sans);
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .mood-chip i {
            width: 14px;
            height: 14px;
        }

        .mood-chip:hover {
            border-color: var(--border-hover);
            color: var(--text);
        }

        .mood-chip.selected {
            background: var(--accent-soft);
            border-color: rgba(22, 163, 74, 0.3);
            color: var(--accent);
        }

        .textarea-wrap {
            position: relative;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            min-height: 180px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 20px;
            color: var(--text);
            font-family: 'Poppins', 'Anek Malayalam', var(--sans);
            font-size: 16px;
            line-height: 1.65;
            resize: none;
            outline: none;
            transition: border-color 0.25s;
        }

        textarea::placeholder {
            color: var(--muted);
        }

        textarea:focus {
            border-color: var(--border-hover);
        }

        .char-count {
            position: absolute;
            bottom: 14px;
            right: 16px;
            font-size: 11px;
            color: var(--muted);
            font-weight: 300;
        }

        .char-count.warn {
            color: var(--accent);
        }

        .privacy-assurance {
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
        }

        .privacy-icon {
            font-size: 20px;
            width: 44px;
            height: 44px;
            background: var(--accent-soft);
            border-radius: 12px;
            display: grid;
            place-items: center;
            flex-shrink: 0;
        }

        .privacy-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 2px;
        }

        .privacy-desc {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.4;
        }



        .send-btn {
            width: 100%;
            padding: 17px;
            background: var(--accent);
            color: #ffffff;
            border: none;
            border-radius: 16px;
            font-family: var(--sans);
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            letter-spacing: 0.02em;
            transition: all 0.25s ease;
            margin-bottom: 32px;
            position: relative;
            overflow: hidden;
        }

        .send-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0);
            transition: background 0.2s;
        }

        .send-btn:hover::after {
            background: rgba(255, 255, 255, 0.08);
        }

        .send-btn:active {
            transform: scale(0.98);
        }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* ── SUCCESS TOAST ── */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--card);
            border: 1px solid rgba(22, 163, 74, 0.3);
            color: var(--accent);
            padding: 12px 24px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 999;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* ── INBOX VIEW ── */
        #inbox-view {
            padding: 0 24px;
            display: none;
            flex: 1;
        }

        .inbox-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .inbox-count {
            font-size: 12px;
            color: var(--muted);
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 4px 10px;
            border-radius: 100px;
        }

        .message-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 12px;
            transition: border-color 0.2s, transform 0.2s;
            cursor: pointer;
            animation: slideUp 0.4s ease both;
        }

        .message-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-1px);
        }

        .message-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .mood-badge {
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 100px;
            font-weight: 500;
            letter-spacing: 0.04em;
        }

        .mood-badge.happy {
            background: var(--teal-soft);
            color: var(--teal);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .mood-badge.sad {
            background: var(--lavender-soft);
            color: var(--lavender);
            border: 1px solid rgba(132, 204, 22, 0.2);
        }

        .mood-badge.angry {
            background: rgba(22, 163, 74, 0.1);
            color: #16a34a;
            border: 1px solid rgba(22, 163, 74, 0.2);
        }

        .mood-badge.anxious {
            background: var(--accent-soft);
            color: var(--accent);
            border: 1px solid rgba(22, 163, 74, 0.2);
        }

        .mood-badge.grateful {
            background: rgba(132, 204, 22, 0.1);
            color: #84cc16;
            border: 1px solid rgba(132, 204, 22, 0.2);
        }

        .mood-badge.neutral {
            background: var(--card);
            color: var(--muted);
            border: 1px solid var(--border);
        }

        .message-time {
            font-size: 11px;
            color: var(--muted);
            font-weight: 300;
        }

        .message-body {
            font-family: var(--serif);
            font-size: 16px;
            font-style: italic;
            line-height: 1.65;
            color: var(--text);
            margin-bottom: 12px;
        }

        .message-footer {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .anon-tag {
            font-size: 11px;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .anon-dot {
            width: 6px;
            height: 6px;
            background: var(--muted);
            border-radius: 50%;
            opacity: 0.4;
        }

        .reaction-row {
            display: flex;
            gap: 6px;
            margin-left: auto;
        }

        .react-btn {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 3px 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--muted);
        }

        .react-btn:hover {
            border-color: var(--border-hover);
            color: var(--text);
        }

        .react-btn.reacted {
            background: var(--accent-soft);
            border-color: rgba(200, 168, 122, 0.3);
            color: var(--accent);
        }

        .empty-state {
            text-align: center;
            padding: 64px 24px;
        }

        .empty-icon {
            width: 56px;
            height: 56px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            display: grid;
            place-items: center;
            margin: 0 auto 16px;
            font-size: 22px;
        }

        .empty-title {
            font-family: var(--serif);
            font-size: 20px;
            font-style: italic;
            color: var(--text);
            margin-bottom: 6px;
        }

        .empty-text {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.6;
        }

        .share-link-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .share-link-url {
            flex: 1;
            font-size: 12px;
            color: var(--muted);
            font-family: 'DM Mono', monospace;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .copy-btn {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 5px 12px;
            font-size: 11px;
            font-family: var(--sans);
            color: var(--text);
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            flex-shrink: 0;
            white-space: nowrap;
        }

        .copy-btn:hover {
            border-color: var(--border-hover);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(14px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* glow orb */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: rgba(22, 163, 74, 0.08);
            top: -80px;
            right: -60px;
        }

        .orb-2 {
            width: 250px;
            height: 250px;
            background: rgba(16, 185, 129, 0.08);
            bottom: 100px;
            left: -80px;
        }
        .initiative {
            font-size: 11px;
            color: var(--accent);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 4px;
            opacity: 0.8;
        }

        footer {
            margin-top: 40px;
            padding: 32px 0;
            text-align: center;
        }

        .footer-divider {
            height: 1px;
            background: linear-gradient(to right, transparent, var(--border), transparent);
            margin-bottom: 24px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .footer-link {
            color: var(--muted);
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .footer-link:hover {
            color: var(--accent);
        }

        .footer-credit {
            font-size: 11px;
            color: var(--muted);
            opacity: 0.7;
        }
    </style>
</head>

<body>

    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="container">
        <header>
            <div class="logo-mark">
                <svg viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M11 2C6.03 2 2 5.8 2 10.5c0 2.1.8 4 2.1 5.5L3 20l4.5-1.4C8.8 19.5 9.9 19.8 11 19.8c4.97 0 9-3.8 9-8.5S15.97 2 11 2z"
                        stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                    <circle cx="8" cy="10.5" r="1" fill="var(--accent)" />
                    <circle cx="11" cy="10.5" r="1" fill="var(--accent)" />
                    <circle cx="14" cy="10.5" r="1" fill="var(--accent)" />
                </svg>
            </div>
            <h1>Whisper</h1>
            <p class="initiative">An initiative by MSF CUSAT Unit</p>
            <p class="tagline">Collect anonymous messages</p>
        </header>



        <!-- COMPOSE -->
        <div id="compose-view">
            <span class="label">How are you feeling?</span>
            <div class="mood-row">
                <button class="mood-chip" onclick="selectMood(this,'happy')"><i data-lucide="smile"></i> Happy</button>
                <button class="mood-chip" onclick="selectMood(this,'sad')"><i data-lucide="frown"></i> Sad</button>
                <button class="mood-chip" onclick="selectMood(this,'angry')"><i data-lucide="flame"></i> Angry</button>
                <button class="mood-chip" onclick="selectMood(this,'anxious')"><i data-lucide="cloud-lightning"></i> Anxious</button>
                <button class="mood-chip" onclick="selectMood(this,'grateful')"><i data-lucide="sparkles"></i> Grateful</button>
            </div>

            <div class="textarea-wrap">
                <textarea id="msg-input" placeholder="Say whatever you've been holding in…" maxlength="2000"
                    oninput="onInput()"></textarea>
                <span class="char-count" id="char-count">0 / 2000</span>
            </div>

            <div class="privacy-assurance">
                <div class="privacy-icon"><i data-lucide="shield-check"></i></div>
                <div class="privacy-text">
                    <p class="privacy-title">Fully Anonymous</p>
                    <p class="privacy-desc">We don't track IPs, locations, or personal data. Your identity is never stored.</p>
                </div>
            </div>

            <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>
                Send anonymously
            </button>

            <footer>
                <div class="footer-divider"></div>
                <div class="footer-links">
                    <a href="mailto:msfcusat@gmail.com" class="footer-link">
                        <span>Email</span>
                    </a>
                    <a href="https://instagram.com/msf_cusat" target="_blank" class="footer-link">
                        <span>Instagram</span>
                    </a>
                    <a href="https://chat.whatsapp.com/DCLsqULYX4W3zNwpLZL8lH" target="_blank" class="footer-link">
                        <span>WhatsApp</span>
                    </a>
                    <a href="https://www.facebook.com/msfcusat" target="_blank" class="footer-link">
                        <span>Facebook</span>
                    </a>
                </div>
                <p class="footer-credit">© 2026 MSF CUSAT Unit. All rights reserved.</p>
            </footer>
        </div>


    </div>

    <div class="toast" id="toast"></div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAovMb1A1D8NXPgyHXDdofzg29vXuDFPQE",
            authDomain: "msf-cusat-7a07b.firebaseapp.com",
            projectId: "msf-cusat-7a07b",
            storageBucket: "msf-cusat-7a07b.firebasestorage.app",
            messagingSenderId: "687295900937",
            appId: "1:687295900937:web:1c9a0be58feecfb801f7d8"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const MAX = 2000;
        let selectedMood = 'neutral';



        function selectMood(el, mood) {
            document.querySelectorAll('.mood-chip').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            selectedMood = mood;
        }



        function onInput() {
            const v = document.getElementById('msg-input').value;
            const cc = document.getElementById('char-count');
            cc.textContent = v.length + ' / ' + MAX;
            cc.classList.toggle('warn', v.length > 1900);
            document.getElementById('send-btn').disabled = v.trim().length < 2;
        }

        async function sendMessage() {
            const btn = document.getElementById('send-btn');
            const text = document.getElementById('msg-input').value.trim();
            if (!text) return;

            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                await db.collection('messages').add({
                    text,
                    mood: selectedMood,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    status: 'unread'
                });

                document.getElementById('msg-input').value = '';
                document.getElementById('char-count').textContent = '0 / ' + MAX;
                showToast('Message sent successfully');
            } catch (error) {
                console.error("Error sending message:", error);
                showToast('Failed to send. Try again.');
                btn.disabled = false;
            } finally {
                btn.textContent = 'Send anonymously';
            }
        }






        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2800);
        }

        lucide.createIcons();
    </script>
</body>

</html>
